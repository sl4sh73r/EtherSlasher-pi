# EtherSlasher dnsmasq - DHCP + DNS
interface=wlan1
bind-interfaces
dhcp-range=10.0.0.10,10.0.0.200,12h
dhcp-option=3,10.0.0.1
dhcp-option=6,10.0.0.1

# DNS - перенаправляем всё на captive portal
address=/#/10.0.0.1

# Логирование
log-dhcp
log-queries
log-facility=/var/log/pineapple/dnsmasq.log

# Не форвардим запросы выше
no-resolv
no-poll

# DHCP lease файл
dhcp-leasefile=/var/lib/misc/dnsmasq.leases
