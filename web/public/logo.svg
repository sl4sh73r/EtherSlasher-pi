<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      /* Slash: draw top→bottom */
      #slash-line {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: draw-slash 0.5s ease-out 0.1s forwards;
      }
      @keyframes draw-slash {
        to { stroke-dashoffset: 0; }
      }
      /* WiFi arcs: appear sequentially */
      #arc1 { opacity: 0; animation: fade-arc 0.3s ease-out 0.5s forwards; }
      #arc2 { opacity: 0; animation: fade-arc 0.3s ease-out 0.7s forwards; }
      #arc3 { opacity: 0; animation: fade-arc 0.3s ease-out 0.9s forwards; }
      #dot1 { opacity: 0; animation: fade-arc 0.2s ease-out 0.4s forwards; }
      @keyframes fade-arc {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      /* Text: appear after slash */
      #text-ether   { opacity: 0; animation: fade-text 0.4s ease-out 0.55s forwards; }
      #text-slasher { opacity: 0; animation: fade-text 0.4s ease-out 0.75s forwards; }
      #text-sub     { opacity: 0; animation: fade-text 0.4s ease-out 0.95s forwards; }
      #line-div     { opacity: 0; animation: fade-text 0.3s ease-out 0.6s forwards; }
      #slash-cap1, #slash-cap2 { opacity: 0; animation: fade-arc 0.3s ease-out 0.5s forwards; }
      @keyframes fade-text {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
    </style>
  </defs>

  <!-- WiFi arcs group -->
  <g transform="translate(150,155)" filter="url(#glow)">
    <circle id="dot1" cx="0" cy="50" r="7" fill="#ff6600"/>
    <path id="arc1" d="M -28,-8 A 58,58 0 0,1 28,-8" fill="none" stroke="#ff6600" stroke-width="7" stroke-linecap="square" opacity="0.9"/>
    <path id="arc2" d="M -55,-38 A 90,90 0 0,1 55,-38" fill="none" stroke="#ff6600" stroke-width="7" stroke-linecap="square" opacity="0.65"/>
    <path id="arc3" d="M -82,-68 A 122,122 0 0,1 82,-68" fill="none" stroke="#ff6600" stroke-width="7" stroke-linecap="square" opacity="0.4"/>
  </g>

  <!-- Slash line (black bg mask + colored line) -->
  <line x1="108" y1="238" x2="192" y2="62" stroke="#000" stroke-width="18"/>
  <line id="slash-line" x1="108" y1="238" x2="192" y2="62" stroke="#ff6600" stroke-width="5" stroke-linecap="square" filter="url(#glow)"/>

  <!-- Slash caps -->
  <line id="slash-cap1" x1="96" y1="244" x2="120" y2="244" stroke="#ff6600" stroke-width="3" stroke-linecap="square"/>
  <line id="slash-cap2" x1="180" y1="56" x2="204" y2="56" stroke="#ff6600" stroke-width="3" stroke-linecap="square"/>

  <!-- Text -->
  <text id="text-ether" x="220" y="148" font-family="'Courier New', monospace" font-size="72" font-weight="700" fill="#ff6600" letter-spacing="6" filter="url(#glow)">ETHER</text>
  <line id="line-div" x1="220" y1="162" x2="560" y2="162" stroke="#ff6600" stroke-width="1.5" opacity="0.5"/>
  <text id="text-slasher" x="222" y="200" font-family="'Courier New', monospace" font-size="38" font-weight="400" fill="#ff6600" letter-spacing="18" opacity="0.85">SLASHER</text>
  <text id="text-sub" x="222" y="228" font-family="'Courier New', monospace" font-size="13" fill="#ff6600" letter-spacing="4" opacity="0.4">WIFI AUDIT PLATFORM</text>
</svg>
