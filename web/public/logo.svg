<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" style="background:transparent;width:100%;max-width:600px;display:block;margin:0 auto;">
<defs>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    @keyframes slash-in{0%{stroke-dashoffset:200;opacity:0}60%{stroke-dashoffset:0;opacity:1}100%{stroke-dashoffset:0;opacity:1}}
    @keyframes tick-in{0%,40%{opacity:0}80%,100%{opacity:1}}
    @keyframes text-in{0%,30%{opacity:0;letter-spacing:20px}80%,100%{opacity:1;letter-spacing:6px}}
    @keyframes sub-in{0%,50%{opacity:0}90%,100%{opacity:0.85}}
    @keyframes line-in{0%,45%{opacity:0;transform:scaleX(0)}85%,100%{opacity:0.5;transform:scaleX(1)}}
    @keyframes arc1-pulse{0%,20%{opacity:0}50%{opacity:0.95}70%{opacity:0.3}85%{opacity:0.95}100%{opacity:0.3}}
    @keyframes arc2-pulse{0%,30%{opacity:0}60%{opacity:0.7}75%{opacity:0.15}90%{opacity:0.7}100%{opacity:0.15}}
    @keyframes arc3-pulse{0%,40%{opacity:0}70%{opacity:0.45}82%{opacity:0.08}95%{opacity:0.45}100%{opacity:0.08}}
    @keyframes cursor-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  </style>
</defs>
<circle cx="150" cy="210" r="0" fill="#ff6600" filter="url(#glow)">
  <animate attributeName="r" values="0;0;9;7" dur="1.8s" fill="freeze"/>
  <animate attributeName="opacity" values="0;0;1;1" dur="1.8s" fill="freeze"/>
</circle>
<path d="M 120,175 A 35,35 0 0,1 180,175" fill="none" stroke="#ff6600" stroke-width="6" stroke-linecap="square" filter="url(#glow)" style="animation:arc1-pulse 2s 1.5s ease-in-out infinite"/>
<path d="M 100,152 A 58,58 0 0,1 200,152" fill="none" stroke="#ff6600" stroke-width="6" stroke-linecap="square" filter="url(#glow)" style="animation:arc2-pulse 2s 1.7s ease-in-out infinite"/>
<path d="M 80,128 A 82,82 0 0,1 220,128" fill="none" stroke="#ff6600" stroke-width="6" stroke-linecap="square" filter="url(#glow)" style="animation:arc3-pulse 2s 1.9s ease-in-out infinite"/>
<line x1="112" y1="242" x2="192" y2="68" stroke="#000" stroke-width="18"/>
<line x1="112" y1="242" x2="192" y2="68" stroke="#ff6600" stroke-width="5" stroke-linecap="square" filter="url(#glow)" stroke-dasharray="200" style="animation:slash-in 1.2s ease-out forwards"/>
<line x1="99" y1="248" x2="125" y2="248" stroke="#ff6600" stroke-width="3" stroke-linecap="square" filter="url(#glow)" style="animation:tick-in 1.5s ease-out forwards"/>
<line x1="179" y1="62" x2="205" y2="62" stroke="#ff6600" stroke-width="3" stroke-linecap="square" filter="url(#glow)" style="animation:tick-in 1.5s ease-out forwards"/>
<text x="240" y="152" font-family="'Courier New', monospace" font-size="72" font-weight="700" fill="#ff6600" filter="url(#glow)" style="animation:text-in 1.6s ease-out forwards">ETHER</text>
<line x1="240" y1="166" x2="575" y2="166" stroke="#ff6600" stroke-width="1.5" style="transform-origin:240px 166px;animation:line-in 1.8s ease-out forwards"/>
<text x="242" y="204" font-family="'Courier New', monospace" font-size="38" font-weight="400" fill="#ff6600" letter-spacing="18" style="animation:sub-in 2s ease-out forwards">SLASHER</text>
<text x="242" y="232" font-family="'Courier New', monospace" font-size="13" fill="#ff6600" letter-spacing="4" opacity="0" style="animation:sub-in 2.2s ease-out forwards">WIFI AUDIT PLATFORM</text>
<rect x="552" y="176" width="3" height="26" fill="#ff6600" style="animation:cursor-blink 1s 2.2s infinite"/>
</svg>
