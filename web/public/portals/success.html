<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Подключение...</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#f0f4f8;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#fff;border-radius:12px;padding:40px 32px;max-width:360px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1)}
  .icon{width:64px;height:64px;background:#e8f5e0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:30px}
  h2{font-size:18px;color:#1a202c;margin-bottom:8px}
  p{font-size:13px;color:#718096;line-height:1.6;margin-bottom:24px}
  .dots{display:flex;justify-content:center;gap:8px}
  .dot{width:10px;height:10px;border-radius:50%;background:#3b82f6;animation:bounce .9s infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}
  .note{font-size:11px;color:#a0aec0;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#10003;</div>
  <h2>Пароль принят</h2>
  <p>Выполняется подключение к сети. Обычно это занимает несколько секунд.</p>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <p class="note">Если интернет не появился — попробуйте переподключиться к сети Wi-Fi</p>
</div>
</body>
</html>
